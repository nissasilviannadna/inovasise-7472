<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facebook Scraper Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #f8f4ea;
      --bg-2: #d5ebe4;
      --card: #ffffff;
      --ink: #10231f;
      --muted: #4e6762;
      --accent: #cf5b2b;
      --accent-dark: #a94620;
      --ok: #1f8a4c;
      --warn: #ad3b2f;
      --line: rgba(16, 35, 31, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 80% -20%, rgba(207, 91, 43, 0.22), transparent 40%),
        radial-gradient(circle at -10% 70%, rgba(49, 134, 113, 0.16), transparent 45%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .panel {
      width: min(960px, 100%);
      background: color-mix(in srgb, var(--card) 88%, #f3fff5 12%);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 18px 55px rgba(16, 35, 31, 0.12);
      overflow: hidden;
      animation: rise 500ms ease-out;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero {
      padding: 22px 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(120deg, rgba(207, 91, 43, 0.13), rgba(31, 138, 76, 0.09));
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2.8vw, 1.95rem);
      letter-spacing: -0.02em;
    }

    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 20px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      background: #fff;
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 1rem;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }

    .check-field {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding: 10px 12px;
      border: 1px dashed var(--line);
      border-radius: 10px;
      background: #f8fbfa;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .secondary-btn {
      background: #eef3f1;
      color: #21433a;
      border: 1px solid #c8d9d4;
    }

    .secondary-btn:hover {
      background: #e4eeeb;
      transform: translateY(-1px);
    }

    .check-field input {
      width: 18px;
      height: 18px;
      margin: 0;
      accent-color: var(--ok);
    }

    .check-field label {
      margin: 0;
      color: var(--ink);
      font-size: 0.9rem;
    }

    label {
      font-size: 0.88rem;
      color: var(--muted);
    }

    input, select, button {
      font-family: inherit;
      font-size: 0.95rem;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      width: 100%;
    }

    input:focus, select:focus {
      outline: 2px solid rgba(207, 91, 43, 0.25);
      border-color: rgba(207, 91, 43, 0.8);
    }

    button {
      border: 0;
      background: linear-gradient(120deg, var(--accent), #e37b3c);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: transform 140ms ease, background 140ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: linear-gradient(120deg, var(--accent-dark), var(--accent));
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .status-box {
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 10px;
      background: #f6f9f8;
      border: 1px solid var(--line);
      font-size: 0.9rem;
    }

    .progress-wrap {
      height: 12px;
      border-radius: 999px;
      background: #e8efed;
      border: 1px solid #d8e2df;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #2f9f67, #8cc269);
      transition: width 250ms ease;
    }

    .mono {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.82rem;
      background: #0d1714;
      color: #cff3de;
      border-radius: 10px;
      min-height: 220px;
      max-height: 300px;
      overflow: auto;
      padding: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
      margin: 0;
    }

    .result {
      margin-top: 10px;
      font-size: 0.9rem;
    }

    .result a {
      color: var(--ok);
      font-weight: 700;
    }

    .error {
      color: var(--warn);
      font-weight: 700;
    }

    .result-card {
      margin: 0 20px 20px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #ffffff;
      padding: 16px;
    }

    .result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .export-btn {
      width: auto;
      padding: 10px 14px;
      display: inline-flex;
      align-items: center;
      border-radius: 10px;
      border: 0;
      background: linear-gradient(120deg, #156f3f, #2f9f67);
      color: #fff;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
    }

    .export-btn:hover {
      transform: translateY(-1px);
      filter: brightness(0.98);
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      max-height: 420px;
      background: #fdfefe;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1400px;
      font-size: 0.88rem;
      table-layout: auto;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #edf6f3;
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 10px;
      white-space: nowrap;
    }

    tbody td {
      padding: 10px;
      border-bottom: 1px solid #edf1f0;
      vertical-align: top;
      min-width: 120px;
      max-width: 320px;
      white-space: normal;
      word-break: normal;
      overflow-wrap: anywhere;
    }

    th[data-col="text"], td[data-col="text"],
    th[data-col="title"], td[data-col="title"] {
      min-width: 260px;
      max-width: 420px;
    }

    th[data-col="url"], td[data-col="url"],
    th[data-col="post_url"], td[data-col="post_url"],
    th[data-col="facebook_profile_url"], td[data-col="facebook_profile_url"] {
      min-width: 140px;
    }

    .link-btn {
      border: 0;
      border-radius: 8px;
      background: linear-gradient(120deg, #1f8a4c, #35a46a);
      color: #fff;
      font-weight: 700;
      padding: 7px 10px;
      text-decoration: none;
      display: inline-block;
      font-size: 0.8rem;
      width: auto;
      white-space: nowrap;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="hero">
      <h1>Facebook Scraper Usaha Digital</h1>
      <div class="sub">Aplikasi Pendukung Pelaksanaan Sensus Ekonomi 2026</div>
    </div>

    <div class="grid">
      <section class="card">
        <h2>Konfigurasi Job</h2>
        <form id="scrapeForm">
          <div class="field">
            <label for="mode">Mode Scraping</label>
            <select id="mode" name="mode" required>
              <option value="search">Pencarian Post</option>
              <option value="marketplace">Marketplace Facebook</option>
              <option value="groups">Grup Facebook</option>
            </select>
          </div>

          <div class="field" id="queryField">
            <label for="query">Kata Kunci Pencarian</label>
            <input id="query" name="query" type="text" placeholder="contoh: jual beli baubau" />
          </div>

          <div class="field" id="marketKabupatenField" style="display:none;">
            <label for="marketplaceKabupaten">Kabupaten</label>
            <select id="marketplaceKabupaten" name="marketplaceKabupaten"></select>
          </div>

          <div class="field" id="marketKecamatanField" style="display:none;">
            <label for="marketplaceKecamatan">Kecamatan</label>
            <select id="marketplaceKecamatan" name="marketplaceKecamatan"></select>
          </div>

          <div class="field" id="marketRadiusField" style="display:none;">
            <label for="marketplaceRadius">Radius (km)</label>
            <input id="marketplaceRadius" name="marketplaceRadius" type="number" min="1" max="500" value="40" />
          </div>

          <div class="field">
            <label for="email">Email Facebook (isi jika belum ada session)</label>
            <input id="email" name="email" type="text" placeholder="email@example.com" autocomplete="username" />
          </div>

          <div class="field">
            <label for="password">Password Facebook (opsional jika session masih valid)</label>
            <input id="password" name="password" type="password" placeholder="password" autocomplete="current-password" />
          </div>

          <div class="check-field">
            <input id="phoneOnly" name="phoneOnly" type="checkbox" />
            <label for="phoneOnly">Simpan hanya post yang punya nomor telepon</label>
          </div>

          <div class="action-row">
            <button type="button" id="resetSessionBtn" class="secondary-btn">Reset Session Facebook</button>
          </div>

          <button type="submit" id="startBtn">Start Scraping</button>
        </form>
      </section>

      <section class="card">
        <h2>Progress Realtime</h2>
        <div id="statusBox" class="status-box">Status: Idle</div>
        <div class="progress-wrap">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <div id="progressText" class="sub">0%</div>
        <div id="errorText" class="error"></div>
        <div id="resultText" class="result"></div>
        <pre id="logBox" class="mono">Menunggu job dimulai...</pre>
      </section>
    </div>

    <section id="resultTableSection" class="result-card" style="display:none;">
      <div class="result-head">
        <div>
          <h2 style="margin:0; font-size:1rem;">Preview Hasil Scraping</h2>
          <div id="tableInfo" class="sub" style="margin-top:4px;">Menampilkan data terbaru.</div>
        </div>
        <button id="exportBtn" class="export-btn" type="button" style="display:none;">Export CSV</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr id="resultTableHead"></tr>
          </thead>
          <tbody id="resultTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const modeEl = document.getElementById("mode");
    const queryField = document.getElementById("queryField");
    const queryLabelEl = document.querySelector('label[for="query"]');
    const marketKabupatenField = document.getElementById("marketKabupatenField");
    const marketKecamatanField = document.getElementById("marketKecamatanField");
    const marketRadiusField = document.getElementById("marketRadiusField");
    const marketplaceKabupatenEl = document.getElementById("marketplaceKabupaten");
    const marketplaceKecamatanEl = document.getElementById("marketplaceKecamatan");
    const form = document.getElementById("scrapeForm");
    const startBtn = document.getElementById("startBtn");
    const resetSessionBtn = document.getElementById("resetSessionBtn");

    const statusBox = document.getElementById("statusBox");
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");
    const logBox = document.getElementById("logBox");
    const resultText = document.getElementById("resultText");
    const errorText = document.getElementById("errorText");
    const resultTableSection = document.getElementById("resultTableSection");
    const tableHead = document.getElementById("resultTableHead");
    const tableBody = document.getElementById("resultTableBody");
    const tableInfo = document.getElementById("tableInfo");
    const exportBtn = document.getElementById("exportBtn");

    let poller = null;
    let locationOptions = {};
    let latestOutputFile = "";

    function populateKecamatanOptions(kabupaten, preferredKecamatan = "") {
      const kecamatanList = locationOptions[kabupaten] || [];
      marketplaceKecamatanEl.innerHTML = "";

      for (const kecamatan of kecamatanList) {
        const opt = document.createElement("option");
        opt.value = kecamatan;
        opt.textContent = kecamatan;
        marketplaceKecamatanEl.appendChild(opt);
      }

      if (preferredKecamatan && kecamatanList.includes(preferredKecamatan)) {
        marketplaceKecamatanEl.value = preferredKecamatan;
      }
    }

    async function setupLocationDropdowns() {
      const res = await fetch("/api/location-options");
      const data = await res.json();
      locationOptions = data.kabupaten_options || {};

      marketplaceKabupatenEl.innerHTML = "";
      const kabupatenList = Object.keys(locationOptions);
      for (const kabupaten of kabupatenList) {
        const opt = document.createElement("option");
        opt.value = kabupaten;
        opt.textContent = kabupaten;
        marketplaceKabupatenEl.appendChild(opt);
      }

      const defaultKabupaten = data.default_kabupaten || kabupatenList[0] || "";
      const defaultKecamatan = data.default_kecamatan || "";
      if (defaultKabupaten) {
        marketplaceKabupatenEl.value = defaultKabupaten;
      }

      populateKecamatanOptions(defaultKabupaten, defaultKecamatan);
    }

    function toggleModeFields() {
      const mode = modeEl.value;
      const needsQuery = mode === "search" || mode === "marketplace";
      const isMarketplace = mode === "marketplace";

      queryField.style.display = needsQuery ? "grid" : "none";
      marketKabupatenField.style.display = isMarketplace ? "grid" : "none";
      marketKecamatanField.style.display = isMarketplace ? "grid" : "none";
      marketRadiusField.style.display = isMarketplace ? "grid" : "none";

      if (mode === "marketplace") {
        queryLabelEl.textContent = "Keyword Marketplace";
      } else {
        queryLabelEl.textContent = "Kata Kunci Pencarian";
      }
    }

    function isHttpUrl(value) {
      return typeof value === "string" && /^https?:\/\//i.test(value);
    }

    function renderResultTable(state) {
      const rows = state.preview_rows || [];
      const hiddenColumns = new Set(["timestamp", "url"]);
      const columns = (state.preview_columns || []).filter((col) => !hiddenColumns.has(col));

      if (!rows.length || !columns.length) {
        resultTableSection.style.display = "none";
        tableHead.innerHTML = "";
        tableBody.innerHTML = "";
        return;
      }

      resultTableSection.style.display = "block";
      tableInfo.textContent = `Menampilkan ${rows.length} baris preview dari total ${state.total_data || 0} data.`;

      tableHead.innerHTML = columns
        .map((col) => `<th data-col="${col}">${col}</th>`)
        .join("");

      tableBody.innerHTML = rows.map((row) => {
        const cells = columns.map((col) => {
          const val = row[col] ?? "";
          if (isHttpUrl(val)) {
            return `<td data-col="${col}"><a class="link-btn" href="${val}" target="_blank" rel="noopener">Buka Link</a></td>`;
          }
          return `<td data-col="${col}">${String(val)}</td>`;
        }).join("");
        return `<tr>${cells}</tr>`;
      }).join("");
    }

    async function pollStatus() {
      const res = await fetch("/api/status");
      const state = await res.json();

      statusBox.textContent = `Status: ${state.status}`;
      progressBar.style.width = `${state.progress || 0}%`;
      progressText.textContent = `${state.progress || 0}%`;
      logBox.textContent = (state.logs && state.logs.length) ? state.logs.join("\n") : "Belum ada log.";

      if (state.error) {
        errorText.textContent = `Error: ${state.error}`;
      } else {
        errorText.textContent = "";
      }

      if (state.output_file) {
        resultText.innerHTML = `Selesai. Total data: <b>${state.total_data}</b>.`;
        latestOutputFile = state.output_file;
        exportBtn.style.display = "inline-flex";
      } else if (!state.running && state.progress === 100) {
        resultText.textContent = "Selesai, tetapi tidak ada data yang didapat.";
        latestOutputFile = "";
        exportBtn.style.display = "none";
      } else {
        resultText.textContent = "";
        if (state.running) {
          latestOutputFile = "";
          exportBtn.style.display = "none";
        }
      }

      renderResultTable(state);

      if (!state.running) {
        startBtn.disabled = false;
      }
    }

    async function startJob(payload) {
      const res = await fetch("/api/start", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.message || "Gagal memulai scraping.");
      }

      startBtn.disabled = true;
      resultText.textContent = "";
      errorText.textContent = "";
      exportBtn.style.display = "none";
      resultTableSection.style.display = "none";

      if (!poller) {
        poller = setInterval(() => {
          pollStatus().catch((err) => {
            errorText.textContent = `Error polling status: ${err.message}`;
          });
        }, 1500);
      }

      await pollStatus();
    }

    async function resetOldFinishedStateOnLoad() {
      try {
        await fetch("/api/reset", { method: "POST" });
      } catch (_) {
        // Ignore reset errors here; status polling will still work.
      }
    }

    modeEl.addEventListener("change", toggleModeFields);
    exportBtn.addEventListener("click", () => {
      if (!latestOutputFile) {
        return;
      }
      window.location.href = `/api/download/${encodeURIComponent(latestOutputFile)}`;
    });
    marketplaceKabupatenEl.addEventListener("change", () => {
      populateKecamatanOptions(marketplaceKabupatenEl.value);
    });

    resetSessionBtn.addEventListener("click", async () => {
      try {
        resetSessionBtn.disabled = true;
        const res = await fetch("/api/session/reset", { method: "POST" });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.message || "Reset session gagal.");
        }
        errorText.textContent = "";
        resultText.textContent = data.message || "Session berhasil direset.";
        logBox.textContent = "Session dihapus. Silakan login ulang saat start scraping.";
        await pollStatus();
      } catch (err) {
        errorText.textContent = err.message;
      } finally {
        resetSessionBtn.disabled = false;
      }
    });
    toggleModeFields();

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const payload = {
        mode: document.getElementById("mode").value,
        query: document.getElementById("query").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        phone_only: document.getElementById("phoneOnly").checked,
        marketplace_kabupaten: document.getElementById("marketplaceKabupaten").value,
        marketplace_kecamatan: document.getElementById("marketplaceKecamatan").value,
        marketplace_location: "",
        marketplace_radius_km: Number(document.getElementById("marketplaceRadius").value || 40),
      };

      try {
        await startJob(payload);
      } catch (err) {
        errorText.textContent = err.message;
        startBtn.disabled = false;
      }
    });

    Promise.all([
      resetOldFinishedStateOnLoad(),
      setupLocationDropdowns(),
    ]).catch((err) => {
      errorText.textContent = `Gagal inisialisasi halaman: ${err.message}`;
    }).finally(() => {
      pollStatus().catch(() => {});
    });
  </script>
</body>
</html>
